        (function chai (){
            //named IIFE
            console.log(`DB Connected`)

        ( (name)=>{
            console.log(`DB2 is connected ${name}`);
        })('ishi');

        // chai()
        
        (function program(){
            console.log(`my program`);      
        })();

        ((name1)=>{
            console.log(`Its programming ${name1}`);
        })('Ishita');

    </script>
