<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pandurang Nimje - Billing</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
}

.bill-container{
  width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#8b0000;
}

.subtitle{
  text-align:center;
  margin-bottom:20px;
  font-weight:bold;
}

.top-info{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #aaa;
  padding:8px;
  text-align:center;
}

th{
  background:#8b0000;
  color:white;
}

input,select{
  width:90%;
  padding:5px;
}

button{
  margin-top:15px;
  padding:10px 15px;
  background:#8b0000;
  color:white;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

button:hover{
  background:#600000;
}

.total-box{
  margin-top:20px;
  text-align:right;
}

.total-box p{
  margin:5px 0;
  font-size:16px;
}

.total-box h2{
  color:#8b0000;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bill-container">

<h1>PANDURANG NIMJE</h1>
<p class="subtitle">Sarees | Cottons | Dress Materials</p>

<div class="top-info">
  <div>
    <strong>Customer Name:</strong><br>
    <input type="text" placeholder="Enter name">
  </div>
  <div>
    <strong>GST Type:</strong><br>
    <select id="gstType" onchange="calculate()">
      <option value="intra">Intra-State (CGST + SGST)</option>
      <option value="inter">Inter-State (IGST)</option>
    </select>
  </div>
</div>

<table>
<thead>
<tr>
  <th>Product</th>
  <th>Qty</th>
  <th>Rate (₹)</th>
  <th>Amount (₹)</th>
</tr>
</thead>

<tbody id="billBody">
<tr>
  <td><input type="text" placeholder="Cotton Saree"></td>
  <td><input type="number" value="1" oninput="calculate()"></td>
  <td><input type="number" value="0" oninput="calculate()"></td>
  <td class="rowTotal">0</td>
</tr>
</tbody>
</table>

<button onclick="addRow()">➕ Add Product</button>

<div class="total-box">
  <p>Subtotal: ₹ <span id="subtotal">0</span></p>
  <p>CGST (2.5%): ₹ <span id="cgst">0</span></p>
  <p>SGST (2.5%): ₹ <span id="sgst">0</span></p>
  <p>IGST (5%): ₹ <span id="igst">0</span></p>
  <h2>Grand Total: ₹ <span id="grandTotal">0</span></h2>
</div>

<div class="footer">
  Thank You! Visit Again 🙏
</div>

<button onclick="window.print()">🖨 Print Bill</button>

</div>

<script>
function addRow(){
  let table = document.getElementById("billBody");
  let row = document.createElement("tr");

  row.innerHTML = `
    <td><input type="text" placeholder="Product"></td>
    <td><input type="number" value="1" oninput="calculate()"></td>
    <td><input type="number" value="0" oninput="calculate()"></td>
    <td class="rowTotal">0</td>
  `;
  table.appendChild(row);
}

function calculate(){
  let rows = document.querySelectorAll("#billBody tr");
  let subtotal = 0;

  rows.forEach(row=>{
    let qty = row.children[1].children[0].value;
    let rate = row.children[2].children[0].value;
    let total = qty * rate;
    row.querySelector(".rowTotal").innerText = total.toFixed(2);
    subtotal += total;
  });

  let gstType = document.getElementById("gstType").value;

  let cgst = 0, sgst = 0, igst = 0;

  if(gstType === "intra"){
    cgst = subtotal * 0.025;
    sgst = subtotal * 0.025;
  } else {
    igst = subtotal * 0.05;
  }

  let grandTotal = subtotal + cgst + sgst + igst;

  document.getElementById("subtotal").innerText = subtotal.toFixed(2);
  document.getElementById("cgst").innerText = cgst.toFixed(2);
  document.getElementById("sgst").innerText = sgst.toFixed(2);
  document.getElementById("igst").innerText = igst.toFixed(2);
  document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
}
</script>

</body>
</html>
