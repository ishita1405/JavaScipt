<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operator & Experssions</title>
</head>
<body>
    <script>
        let a=10;
        let b=4;

        console.log("a + b =",a+b)
        console.log("a - b =",a-b)
        console.log("a / b =",a/b)
        console.log("a % b =",a%b)
        console.log("a * b =",a*b)
        console.log("a * b =",a*b)
      
      
        //increament 

        console.log("++a =",++a) //value=10 +1 =11
        console.log("a++ =",a++)// same 11 print but 12 value  
        console.log("--a=",--a)//but reduce hogi 12 -1=11
        console.log("a-- =",a--) //print 11 but value =10
        console.log(a)//print 10 
        console.log("a++ =",a++) // print 10 but value 11
        console.log(a)

        //assignment operator
        let x =10;
        console.log(x);

        x += 5;
        console.log(x);

        x -= 4;
        console.log(x);

        x *= 3;
        console.log(x);

        x /= 4;
        console.log(x);

        x %= 5;
        console.log(x);

        x **= 5;
        console.log(x);


        //comparision operator

        let com1=10;
        let com2 = 15;
        let com3 = "10";

        console.log("com1 == com2", com1==com2)
        console.log("com1 != com2", com1!=com2)
        console.log("com1 >= com2", com1>=com2)
        console.log("com1 <= com2", com1<=com2)
        console.log("com1 > com2", com1>com2)
        console.log("com1 < com2", com1<com2)
        console.log("com1 === com3", com1===com3)

        //logical operator

        let sum1 =12;
        let sum2 = 10;

        console.log(sum1 <= sum2 && sum1 ==sum2);  // both are true then return true otherwise any one  are false so return false 
        console.log(sum1 >= sum2 || sum1 == sum2); // any one are true then return true
         console.log(sum1 <= sum2 != sum1 ==sum2); // != compare both terms 


        //Command line 
        //-> used for the single line commmand 
        
        /* Happy 
            New
            Year */ 
        /* */ //-> multi line command



















    </script>
    
</body>
</html>
