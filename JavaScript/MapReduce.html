<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map and Reduce</title>
</head>
<body>
    <script>
        //map
        let arr=[45,23,21]
        console.log(arr)
        let a=arr.map((value,index,array)=>{
            console.log(value,index,array)
        return value+index

        })
        //filter the value that passed
        console.log(a)
        let arr2 =[45,23,21,0,3,5]
        let a2=arr2.filter((a)=>{
            return a <10
        })
        console.log(a2,arr2)
        
        //array reduce method

        let arr3=[1,2,3,5,2,1]
        let newarr3 = arr3.reduce((h1,h2)=>{
            return h1+h2
        })
        console.log(newarr3)




    </script>
    
</body>
</html>
