<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number</title>
</head>
<body>
    <script>
        const score=400
        console.log(score);

        const balance = new Number(100)
        console.log(balance);

        console.log(balance.toString().length)
        console.log(balance.toFixed(2))//to fixed used for the proper value to used our billing system

        const otherNumber = 23.5646434
        console.log(otherNumber.toPrecision(21))//used the priority for the decimal value after and before decimal

        const hundreds=10000000000
        console.log(hundreds.toLocaleString('en-In'))



        ///+++++++++++++++++++++++MATH+++++++++++++++++++++++

        console.log(Math);
        console.log(Math.abs(4))
        console.log(Math.round(4.64))
        console.log(Math.ceil(4.2))
        console.log(Math.floor(4.9))
        console.log(Math.min(4,3,5,7,2,8,1,54))
        console.log(Math.max(1342,56,24,15,464,24))
        console.log(Math.random())
        console.log((Math.random()*10) + 1);
        console.log(Math.floor(Math.random()*10) + 1);

        const min = 10
        const max = 20
        console.log(Math.floor (Math.random()*(max-min+1) + min));


        

















        

    </script>
</body>
</html>
