<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY 1 Javascript</title>
</head>
<body>
    <h2> What Can Javascript Do?</h2>
    <p id="demo">Javascript can change the style of an HTML Element.</p>
    <p id="demo1">Javascript can hide HTML elements.</p>

    <button type="button" onclick="document.getElementById('demo').style.fontSize = '35px'">Click Me!</button>
    <button type="button" onclick="document.getElementById('demo1').style.display = 'None'">Try it!</button>
    <button onclick="window.print()">Print this page</button>
    <script>
        //alert(3+3);
        console.log(4+4);

        function myFunction() {
            document.getElementById("demo1").innerHTML = "Paragraph changed.";
        }
        document.write(5+6);
        //document.alert(3+3);
    </script>
    
</body>
</html>
